
<style>
:root{
  --bg:#0f1419;
  --panel:#151b22;
  --panel-2:#0d1218;
  --text:#e6edf3;
  --muted:#9fb0c0;
  --border:#2a3440;
  --border-2:#3b4857;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#0b1015,#111821);color:var(--text)}
.app{padding:16px;max-width:1240px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:14px;color:var(--text)}
.teams{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.team-panel,.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.25)}
.team-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.team-label{font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;letter-spacing:.02em}
.radiant-label{background:#17351d;color:#80e08d}.dire-label{background:#3b1b1b;color:#ef8b8b}
.slots{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.slot{aspect-ratio:3/4;border:1px dashed var(--border-2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:var(--panel-2);transition:border-color .15s,transform .15s}
.slot:hover{border-color:#5a6a7d;transform:translateY(-1px)}.slot.filled{border-style:solid;border-color:var(--border-2)}
.slot img{width:100%;height:100%;object-fit:cover;object-position:top}
.slot-tags{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);display:flex;justify-content:center;gap:3px;padding:3px 2px}
.tag{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px}.tag-s{background:#173f61;color:#8fd3ff}.tag-d{background:#5e2323;color:#ff9f9f}.tag-c{background:#2c4518;color:#b9e87f}
.slot-name{font-size:9px;color:#fff;text-align:center;padding:2px 4px;position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.62);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-empty-icon{font-size:28px;color:#7a8794}
.bars{display:flex;flex-direction:column;gap:7px}.bar-row{display:flex;align-items:center;gap:8px}.bar-label{font-size:12px;color:var(--muted);width:56px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--panel-2);border-radius:999px;overflow:hidden;border:1px solid #24303b}.bar-fill{height:100%;border-radius:999px;transition:width .3s}.bar-val{font-size:12px;font-weight:700;width:24px;text-align:right;color:var(--text)}
.bar-s .bar-fill{background:#378add}.bar-d .bar-fill{background:#e24b4a}.bar-c .bar-fill{background:#639922}
.team-alerts{margin-top:12px;display:flex;flex-direction:column;gap:6px;min-height:30px}.alert{font-size:12px;line-height:1.35;padding:7px 10px;border-radius:8px;font-weight:600}
.alert-warn{background:#3e2f10;color:#ffd76a;border:1px solid #7c6122}.alert-danger{background:#402224;color:#ff9d9d;border:1px solid #81454a}.alert-ok{background:#183421;color:#8ee6a5;border:1px solid #2e6b43}.alert-info{background:#162b3d;color:#96cfff;border:1px solid #2d5677}
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.search-box{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border-2);border-radius:9px;background:var(--panel-2);color:var(--text);margin-bottom:10px}.search-box:focus{outline:none;border-color:#5b7086}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;max-height:300px;overflow-y:auto;padding-right:4px}
.hero-thumb{position:relative;aspect-ratio:3/4;border:1px solid var(--border);border-radius:6px;cursor:pointer;overflow:hidden;background:var(--panel-2);transition:border-color .1s,transform .1s}.hero-thumb:hover{border-color:#5a6a7d;transform:translateY(-1px)}.hero-thumb.used{opacity:.28;pointer-events:none}.hero-thumb img{width:100%;height:100%;object-fit:cover;object-position:top}
.hero-thumb-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:8px;color:#fff;text-align:center;padding:1px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-thumb-tags{position:absolute;top:1px;right:1px;display:flex;flex-direction:column;gap:1px}.mini-tag{font-size:7px;padding:1px 2px;border-radius:2px;font-weight:700}
.suggestions{display:flex;flex-direction:column;gap:6px;max-height:560px;overflow-y:auto;padding-right:4px}
.sugg-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:var(--panel-2);transition:border-color .15s,transform .15s}.sugg-item:hover{border-color:#5a6a7d;transform:translateY(-1px)}
.sugg-rank{font-size:12px;font-weight:800;color:var(--muted);width:20px;text-align:right;flex-shrink:0}.sugg-img{width:34px;height:44px;border-radius:5px;object-fit:cover;object-position:top;flex-shrink:0}.sugg-info{flex:1;min-width:0}
.sugg-name{font-size:13px;font-weight:700;color:var(--text)}.sugg-reason{font-size:11px;color:var(--muted);margin-top:1px}.sugg-scores{display:flex;gap:4px;margin-top:4px}
.target-team{display:flex;gap:6px;margin-bottom:10px}.team-btn{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--border-2);background:var(--panel-2);color:var(--muted);cursor:pointer;transition:all .15s;font-weight:700}.team-btn.active-r{background:#17351d;color:#80e08d;border-color:#2e6b43}.team-btn.active-d{background:#3b1b1b;color:#ef8b8b;border-color:#7a4444}
.remove-btn{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(200,50,50,.88);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;z-index:2}.slot:hover .remove-btn{opacity:1}
.no-sugg{font-size:12px;color:var(--muted);padding:8px 0}.new-badge{position:absolute;top:2px;left:2px;background:#534AB7;color:#CECBF6;font-size:7px;font-weight:700;padding:1px 3px;border-radius:2px;z-index:3}
::-webkit-scrollbar{width:10px}::-webkit-scrollbar-thumb{background:#344252;border-radius:999px}::-webkit-scrollbar-track{background:#111821}
@media (max-width:980px){.teams,.bottom{grid-template-columns:1fr}}
</style>

<div class="app">
<h1>Dota 2 Draft Assistant</h1>

<div class="teams">
  <div class="team-panel">
    <div class="team-header">
      <span class="team-label radiant-label">Radiant</span>
      <span style="font-size:11px;color:var(--color-text-secondary)">Click heroes to add · hover to remove</span>
    </div>
    <div class="slots" id="slots-radiant"></div>
    <div class="bars" id="bars-radiant"></div>
    <div class="team-alerts" id="alerts-radiant"></div>
  </div>
  <div class="team-panel">
    <div class="team-header">
      <span class="team-label dire-label">Dire</span>
      <span style="font-size:11px;color:var(--color-text-secondary)">Click heroes to add · hover to remove</span>
    </div>
    <div class="slots" id="slots-dire"></div>
    <div class="bars" id="bars-dire"></div>
    <div class="team-alerts" id="alerts-dire"></div>
  </div>
</div>


<div class="bottom">
  <div class="panel">
    <div class="panel-title">Hero pool</div>
    <div class="target-team">
      <button class="team-btn active-r" id="btn-radiant" onclick="setTarget('radiant')">+ Radiant</button>
      <button class="team-btn" id="btn-dire" onclick="setTarget('dire')">+ Dire</button>
    </div>
    <input class="search-box" id="hero-search" placeholder="Search heroes..." oninput="renderPool()">
    <div class="hero-grid" id="hero-grid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Suggestions</div>
    <div class="target-team">
      <button class="team-btn active-r" id="sugg-btn-radiant" onclick="setSuggTarget('radiant')">Radiant</button>
      <button class="team-btn" id="sugg-btn-dire" onclick="setSuggTarget('dire')">Dire</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>
</div>
</div>

<script>
const HEROES = {
"abaddon":{s:3,d:1,c:1},"alchemist":{s:1,d:2,c:2},"ancient apparition":{s:0,d:3,c:1},"anti-mage":{s:0,d:3,c:2},"arc warden":{s:1,d:3,c:1},"axe":{s:1,d:3,c:3},"bane":{s:1,d:1,c:3},"batrider":{s:1,d:2,c:3},"beastmaster":{s:1,d:3,c:3},"bloodseeker":{s:0,d:3,c:2},"bounty hunter":{s:2,d:2,c:2},"brewmaster":{s:1,d:2,c:2},"bristleback":{s:0,d:3,c:1},"broodmother":{s:0,d:3,c:2},"centaur warrunner":{s:2,d:2,c:2},"chaos knight":{s:1,d:2,c:1},"chen":{s:2,d:2,c:1},"clinkz":{s:0,d:3,c:1},"clockwerk":{s:1,d:1,c:3},"crystal maiden":{s:0,d:2,c:2},"dark seer":{s:2,d:2,c:2},"dark willow":{s:2,d:2,c:2},"dawnbreaker":{s:3,d:2,c:1},"dazzle":{s:3,d:2,c:1},"death prophet":{s:0,d:3,c:1},"disruptor":{s:1,d:2,c:3},"doom":{s:0,d:3,c:3},"dragon knight":{s:0,d:2,c:3},"drow ranger":{s:0,d:3,c:2},"earth spirit":{s:2,d:2,c:3},"earthshaker":{s:1,d:2,c:3},"elder titan":{s:1,d:3,c:2},"ember spirit":{s:0,d:2,c:2},"enchantress":{s:1,d:2,c:2},"enigma":{s:0,d:2,c:3},"faceless void":{s:0,d:2,c:3},"grimstroke":{s:1,d:3,c:3},"gyrocopter":{s:0,d:3,c:1},"hoodwink":{s:0,d:3,c:2},"huskar":{s:0,d:3,c:1},"invoker":{s:1,d:3,c:3},"io":{s:3,d:2,c:0},"jakiro":{s:1,d:2,c:2},"juggernaut":{s:2,d:2,c:0},"keeper of the light":{s:3,d:2,c:2},"kez":{s:0,d:3,c:1},"kunkka":{s:1,d:2,c:3},"legion commander":{s:2,d:2,c:2},"leshrac":{s:0,d:3,c:1},"lich":{s:1,d:3,c:2},"lifestealer":{s:2,d:2,c:1},"lina":{s:0,d:3,c:1},"lion":{s:0,d:3,c:3},"lone druid":{s:1,d:2,c:2},"luna":{s:0,d:3,c:1},"lycan":{s:1,d:3,c:2},"magnus":{s:1,d:2,c:3},"marci":{s:2,d:2,c:2},"mars":{s:2,d:2,c:2},"medusa":{s:0,d:3,c:1},"meepo":{s:0,d:3,c:2},"mirana":{s:2,d:2,c:2},"monkey king":{s:0,d:3,c:2},"morphling":{s:0,d:3,c:2},"muerta":{s:1,d:3,c:1},"naga siren":{s:1,d:3,c:2},"nature's prophet":{s:0,d:3,c:3},"necrophos":{s:1,d:3,c:1},"night stalker":{s:0,d:2,c:3},"nyx assassin":{s:0,d:3,c:2},"ogre magi":{s:1,d:2,c:2},"omniknight":{s:3,d:2,c:1},"oracle":{s:3,d:2,c:1},"outworld destroyer":{s:2,d:2,c:1},"pangolier":{s:0,d:2,c:3},"phantom assassin":{s:0,d:3,c:1},"phantom lancer":{s:0,d:3,c:1},"phoenix":{s:2,d:3,c:0},"primal beast":{s:0,d:2,c:3},"puck":{s:0,d:3,c:2},"pudge":{s:1,d:3,c:2},"pugna":{s:2,d:3,c:1},"queen of pain":{s:0,d:3,c:1},"razor":{s:0,d:2,c:1},"riki":{s:1,d:3,c:2},"ringmaster":{s:2,d:2,c:1},"rubick":{s:1,d:2,c:2},"sand king":{s:0,d:3,c:2},"shadow demon":{s:3,d:2,c:2},"shadow fiend":{s:1,d:3,c:2},"shadow shaman":{s:0,d:2,c:3},"silencer":{s:2,d:2,c:2},"skywrath mage":{s:0,d:3,c:2},"slardar":{s:0,d:3,c:3},"slark":{s:1,d:2,c:3},"snapfire":{s:1,d:2,c:1},"sniper":{s:0,d:3,c:1},"spectre":{s:0,d:3,c:3},"spirit breaker":{s:1,d:2,c:3},"storm spirit":{s:0,d:3,c:2},"sven":{s:1,d:3,c:2},"techies":{s:1,d:3,c:1},"templar assassin":{s:0,d:3,c:2},"terrorblade":{s:1,d:3,c:1},"tidehunter":{s:1,d:3,c:2},"timbersaw":{s:0,d:3,c:0},"tinker":{s:0,d:3,c:1},"tiny":{s:1,d:2,c:3},"treant protector":{s:2,d:1,c:2},"troll warlord":{s:0,d:2,c:2},"tusk":{s:2,d:2,c:2},"underlord":{s:2,d:2,c:3},"undying":{s:2,d:2,c:1},"ursa":{s:0,d:3,c:2},"vengeful spirit":{s:3,d:2,c:2},"venomancer":{s:2,d:2,c:2},"viper":{s:1,d:3,c:2},"visage":{s:1,d:2,c:1},"void spirit":{s:0,d:3,c:2},"warlock":{s:2,d:3,c:1},"weaver":{s:1,d:3,c:0},"windranger":{s:1,d:2,c:2},"winter wyvern":{s:2,d:3,c:2},"witch doctor":{s:1,d:3,c:2},"wraith king":{s:1,d:3,c:2},"zeus":{s:0,d:3,c:0}
};

const NEW_HEROES=new Set(["kez","ringmaster"]);

function imgUrl(name){
  const map={"ancient apparition":"ancient_apparition","anti-mage":"anti_mage","arc warden":"arc_warden","bounty hunter":"bounty_hunter","centaur warrunner":"centaur_warrunner","chaos knight":"chaos_knight","crystal maiden":"crystal_maiden","dark seer":"dark_seer","dark willow":"dark_willow","death prophet":"death_prophet","dragon knight":"dragon_knight","drow ranger":"drow_ranger","earth spirit":"earth_spirit","elder titan":"elder_titan","ember spirit":"ember_spirit","faceless void":"faceless_void","keeper of the light":"keeper_of_the_light","legion commander":"legion_commander","lifestealer":"life_stealer","lone druid":"lone_druid","monkey king":"monkey_king","nature's prophet":"furion","naga siren":"naga_siren","night stalker":"night_stalker","nyx assassin":"nyx_assassin","ogre magi":"ogre_magi","outworld destroyer":"obsidian_destroyer","phantom assassin":"phantom_assassin","phantom lancer":"phantom_lancer","primal beast":"primal_beast","queen of pain":"queenofpain","sand king":"sand_king","shadow demon":"shadow_demon","shadow fiend":"nevermore","shadow shaman":"shadow_shaman","skywrath mage":"skywrath_mage","spirit breaker":"spirit_breaker","storm spirit":"storm_spirit","templar assassin":"templar_assassin","treant protector":"treant","troll warlord":"troll_warlord","vengeful spirit":"vengefulspirit","void spirit":"void_spirit","winter wyvern":"winter_wyvern","witch doctor":"witch_doctor","wraith king":"skeleton_king"};
  const n=map[name]||name.toLowerCase().replace(/['\-\s]/g,'_').replace(/[^a-z0-9_]/g,'');
  return`https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${n}.png`;
}

const state={radiant:[],dire:[],target:'radiant',suggTarget:'radiant'};
const MAX=5;

function setTarget(t){state.target=t;document.getElementById('btn-radiant').className='team-btn'+(t==='radiant'?' active-r':'');document.getElementById('btn-dire').className='team-btn'+(t==='dire'?' active-d':'');}
function setSuggTarget(t){state.suggTarget=t;document.getElementById('sugg-btn-radiant').className='team-btn'+(t==='radiant'?' active-r':'');document.getElementById('sugg-btn-dire').className='team-btn'+(t==='dire'?' active-d':'');renderSuggestions();}

function addHero(name){
  const team=state.target;
  if(state[team].length>=MAX)return;
  if(state.radiant.includes(name)||state.dire.includes(name))return;
  state[team].push(name);renderAll();
}
function removeHero(team,name){state[team]=state[team].filter(h=>h!==name);renderAll();}
function totals(team){return state[team].reduce((a,h)=>{const r=HEROES[h]||{s:0,d:0,c:0};return{s:a.s+r.s,d:a.d+r.d,c:a.c+r.c}},{s:0,d:0,c:0});}

function renderSlots(team){
  const el=document.getElementById('slots-'+team);el.innerHTML='';
  for(let i=0;i<MAX;i++){
    const div=document.createElement('div');
    div.className='slot'+(state[team][i]?' filled':'');
    if(state[team][i]){
      const name=state[team][i];const r=HEROES[name]||{s:0,d:0,c:0};
      const isNew=NEW_HEROES.has(name);
      div.innerHTML=`<img src="${imgUrl(name)}" alt="${name}" onerror="this.style.display='none'">
        <div class="slot-name">${name}</div>
        ${isNew?'<div class="new-badge">NEW</div>':''}
        <div class="slot-tags"><span class="tag tag-s">S${r.s}</span><span class="tag tag-d">D${r.d}</span><span class="tag tag-c">C${r.c}</span></div>
        <div class="remove-btn" onclick="removeHero('${team}','${name}')">✕</div>`;
    } else {
      div.innerHTML=`<span class="slot-empty-icon">+</span>`;
      div.onclick=()=>setTarget(team);
    }
    el.appendChild(div);
  }
}

function renderBars(team){
  const el=document.getElementById('bars-'+team);const t=totals(team);const max=MAX*3;
  el.innerHTML=['s','d','c'].map((k,i)=>{
    const labels=['Save','Damage','Catch'];const cls=['bar-s','bar-d','bar-c'];
    const pct=Math.round(t[k]/max*100);
    return`<div class="bar-row ${cls[i]}"><span class="bar-label">${labels[i]}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span class="bar-val">${t[k]}</span></div>`;
  }).join('');
}

function renderAlerts(){
  ['radiant','dire'].forEach(team=>{
    const el=document.getElementById('alerts-'+team);
    const t=totals(team);const picked=state[team].length;
    if(!el) return;
    if(picked===0){el.innerHTML='<span class="alert alert-info">Build this team to see team-specific draft tips.</span>';return;}
    const msgs=[];
    const targetS=picked*1.0,targetD=picked*1.1,targetC=picked*0.9;
    const low=[];
    if(t.s<targetS*0.7) low.push('save');
    if(t.d<targetD*0.7) low.push('damage');
    if(t.c<targetC*0.7) low.push('catch');
    if(low.length){
      low.forEach(cat=>msgs.push({type:'danger',msg:`Low ${cat.toUpperCase()} — this team may struggle to ${cat==='save'?'protect cores after initiation':cat==='damage'?'finish kills and close fights':'start fights or punish greed'}.`}));
    } else {
      const ratios={save:t.s/(targetS||1),damage:t.d/(targetD||1),catch:t.c/(targetC||1)};
      const sorted=Object.entries(ratios).sort((a,b)=>b[1]-a[1]);
      const [highCat,highVal]=sorted[0];
      const [lowCat,lowVal]=sorted[2];
      if(highVal-lowVal>0.65){
        msgs.push({type:'warn',msg:`${highCat.charAt(0).toUpperCase()+highCat.slice(1)} is doing the heavy lifting — next picks should stabilise ${lowCat}.`});
      } else {
        msgs.push({type:'ok',msg:'Draft looks reasonably balanced across save, damage, and catch.'});
      }
    }
    const hasEliteSave=state[team].some(h=>(HEROES[h]?.s||0)===3);
    if(hasEliteSave) msgs.push({type:'info',msg:'Elite SAVE is already covered — future picks should focus more on damage or catch.'});
    el.innerHTML=msgs.slice(0,2).map(a=>`<span class="alert alert-${a.type}">${a.msg}</span>`).join('');
  });
}

function renderPool(){
  const q=(document.getElementById('hero-search').value||'').toLowerCase();
  const used=new Set([...state.radiant,...state.dire]);
  const el=document.getElementById('hero-grid');el.innerHTML='';
  Object.entries(HEROES).filter(([n])=>!q||n.includes(q)).forEach(([name,r])=>{
    const div=document.createElement('div');
    div.className='hero-thumb'+(used.has(name)?' used':'');
    const isNew=NEW_HEROES.has(name);
    div.innerHTML=`<img src="${imgUrl(name)}" alt="${name}" onerror="this.style.display='none'">
      <div class="hero-thumb-name">${name}</div>
      ${isNew?'<div class="new-badge">NEW</div>':''}
      <div class="hero-thumb-tags"><span class="mini-tag tag-s">S${r.s}</span><span class="mini-tag tag-d">D${r.d}</span><span class="mini-tag tag-c">C${r.c}</span></div>`;
    div.onclick=()=>addHero(name);
    el.appendChild(div);
  });
}

function renderSuggestions(){
  const team=state.suggTarget;const used=new Set([...state.radiant,...state.dire]);
  const t=totals(team);const picked=state[team].length;const slots=MAX-picked;
  const el=document.getElementById('suggestions');
  if(slots===0){el.innerHTML=`<div class="no-sugg">Draft is full for this team.</div>`;return;}
  const targetS=MAX*1.0,targetD=MAX*1.1,targetC=MAX*0.9;
  const hasEliteSave=state[team].some(h=>(HEROES[h]?.s||0)===3);
  let gapS=Math.max(0,targetS-t.s),gapD=Math.max(0,targetD-t.d),gapC=Math.max(0,targetC-t.c);
  if(hasEliteSave) gapS=0;
  const candidates=Object.entries(HEROES).filter(([n])=>!used.has(n)).map(([name,r])=>{
    const lowNeedScore = r.s*gapS*1.1 + r.d*gapD + r.c*gapC;
    const helps = [(gapS>0&&r.s>0)?1:0,(gapD>0&&r.d>0)?1:0,(gapC>0&&r.c>0)?1:0].reduce((a,b)=>a+b,0);
    const hybridBonus = helps>=3?1.4:helps===2?0.8:0;
    const overstackPenalty = (t.s>=targetS? r.s*0.45:0) + (t.d>=targetD? r.d*0.30:0) + (t.c>=targetC? r.c*0.30:0);
    const pureSavePenalty = hasEliteSave ? r.s*0.65 : 0;
    const score = lowNeedScore + hybridBonus - overstackPenalty - pureSavePenalty;
    let reason='Balanced Fix';
    const reasons=[];
    if(gapS>0 && r.s>=2) reasons.push('Save');
    if(gapD>0 && r.d>=2) reasons.push('Damage');
    if(gapC>0 && r.c>=2) reasons.push('Catch');
    if(hasEliteSave && reasons.includes('Save')) reasons.splice(reasons.indexOf('Save'),1);
    if(reasons.length===2) reason=`${reasons[0]} + ${reasons[1]}`;
    else if(reasons.length===1) reason=`Best ${reasons[0]} Fix`;
    else if(helps>=2) reason='Balanced Fix';
    else if(r.c>=Math.max(r.s,r.d)) reason='High Catch Option';
    else if(r.d>=Math.max(r.s,r.c)) reason='Damage Option';
    return{name,r,score,reason};
  }).sort((a,b)=>b.score-a.score || (b.r.s+b.r.d+b.r.c)-(a.r.s+a.r.d+a.r.c)).slice(0,20);
  if(candidates.length===0){el.innerHTML=`<div class="no-sugg">No heroes available.</div>`;return;}
  el.innerHTML=candidates.map((c,i)=>`
    <div class="sugg-item" onclick="addHeroToTeam('${c.name}','${team}')">
      <div class="sugg-rank">${i+1}.</div>
      <img class="sugg-img" src="${imgUrl(c.name)}" alt="${c.name}" onerror="this.style.display='none'">
      <div class="sugg-info">
        <div class="sugg-name">${c.name}${NEW_HEROES.has(c.name)?' <span style="font-size:9px;background:#534AB7;color:#CECBF6;padding:1px 4px;border-radius:3px;font-weight:700">NEW</span>':''}</div>
        <div class="sugg-reason">${c.reason}</div>
        <div class="sugg-scores"><span class="tag tag-s">S${c.r.s}</span><span class="tag tag-d">D${c.r.d}</span><span class="tag tag-c">C${c.r.c}</span></div>
      </div>
    </div>`).join('');
}

function addHeroToTeam(name,team){if(state[team].length>=MAX)return;if(state.radiant.includes(name)||state.dire.includes(name))return;state[team].push(name);renderAll();}

function renderAll(){['radiant','dire'].forEach(t=>{renderSlots(t);renderBars(t);});renderAlerts();renderPool();renderSuggestions();}
renderAll();
</script>
